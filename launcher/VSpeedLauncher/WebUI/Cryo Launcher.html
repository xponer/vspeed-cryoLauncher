<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Cryo — Modpack Launcher</title>

  <!-- Geist (sans + mono) via fontsource CDN -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@fontsource/geist-sans@5.0.3/400.css" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@fontsource/geist-sans@5.0.3/500.css" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@fontsource/geist-sans@5.0.3/600.css" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@fontsource/geist-sans@5.0.3/700.css" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@fontsource/geist-mono@5.0.3/400.css" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@fontsource/geist-mono@5.0.3/500.css" />

  <link rel="stylesheet" href="src/styles.css" />

  <!-- In-page startup splash (paints immediately, before React/Babel load). Removed
       by store.jsx once the initial data has loaded — same surface as the app, so
       there's no black gap between the splash and the rendered launcher. -->
  <style>
    html, body { margin: 0; background: #070910; }
    #cryo-splash {
      position: fixed; inset: 0; z-index: 99999;
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      background: radial-gradient(62% 62% at 50% 42%, #16182A 0%, #0A0C14 62%, #070910 100%);
      transition: opacity .4s ease; opacity: 1;
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
    }
    #cryo-splash.cryo-hide { opacity: 0; pointer-events: none; }
    /* Static logo (no transform animation — SVG rotation rasterises on the main
       thread, which Babel pegs at startup, causing jank). */
    #cryo-splash .cs-flake { width: 80px; height: 80px; opacity: .95; }
    #cryo-splash .cs-name { margin-top: 16px; font-size: 27px; font-weight: 700; color: #ECECF1; letter-spacing: -.5px; }
    #cryo-splash .cs-sub  { margin-top: 5px; font-size: 12.5px; color: #8A90A8; }
    /* GPU-composited spinner — stays smooth even while the main thread is busy. */
    #cryo-splash .cs-spin {
      margin-top: 22px; width: 30px; height: 30px;
      border: 3px solid rgba(120,140,200,.16); border-top-color: #7AA2FF; border-radius: 50%;
      animation: cs-rot .8s linear infinite; will-change: transform;
    }
    @keyframes cs-rot { to { transform: rotate(360deg); } }
  </style>

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
</head>
<body>
  <div id="cryo-splash">
    <svg class="cs-flake" viewBox="0 0 24 24" fill="none" stroke-width="1.5" stroke-linecap="round">
      <defs>
        <linearGradient id="cs-grad" x1="0" y1="0" x2="1" y2="1">
          <stop offset="0" stop-color="#63B3FF" />
          <stop offset="1" stop-color="#A06BFF" />
        </linearGradient>
      </defs>
      <path d="M12 2 L12 22 M2 12 L22 12 M4.9 4.9 L19.1 19.1 M19.1 4.9 L4.9 19.1" stroke="url(#cs-grad)" />
    </svg>
    <div class="cs-name">Cryo</div>
    <div class="cs-sub">loading…</div>
    <div class="cs-spin"></div>
  </div>
  <div id="root"></div>

  <script type="text/babel" src="src/mockData.jsx"></script>
  <script type="text/babel" src="src/i18n.jsx"></script>
  <script type="text/babel" src="src/store.jsx"></script>
  <script type="text/babel" src="src/ui.jsx"></script>
  <script type="text/babel" src="src/charts.jsx"></script>
  <script type="text/babel" src="src/instance-overview.jsx"></script>
  <script type="text/babel" src="src/instance-tabs.jsx"></script>
  <script type="text/babel" src="src/library.jsx"></script>
  <script type="text/babel" src="src/instance.jsx"></script>
  <script type="text/babel" src="src/logs.jsx"></script>
  <script type="text/babel" src="src/dashboard.jsx"></script>
  <script type="text/babel" src="src/assistant.jsx"></script>
  <script type="text/babel" src="src/modrinth.jsx"></script>
  <script type="text/babel" src="src/settings.jsx"></script>
  <script type="text/babel" src="src/app.jsx"></script>
</body>
</html>
