name: 🐞 Bug Report
description: Report a bug or crash in Cryo Launcher
title: "[Bug]: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for testing **Cryo**! Please fill this in so we can reproduce and fix the bug quickly.
        Tip: the version is in **Settings → About**, and you can open the launcher log from **Settings → Self-Check → Open launcher log**.
  - type: input
    id: version
    attributes:
      label: Launcher version
      description: Shown in Settings → About
      placeholder: v1.0.0
    validations:
      required: true
  - type: textarea
    id: what
    attributes:
      label: What happened?
      description: A clear description of the bug. Screenshots help — paste or drag them in.
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Go to ...
        2. Click ...
        3. See error
  - type: textarea
    id: expected
    attributes:
      label: What did you expect to happen?
  - type: input
    id: instance
    attributes:
      label: Instance / loader / MC version
      placeholder: "ATM10 · NeoForge 21.1.x · MC 1.21.1"
  - type: dropdown
    id: area
    attributes:
      label: Where did it happen?
      options:
        - Launching the game
        - Creating an instance
        - Installing a modpack (Modrinth/CurseForge)
        - Mod browser / updates
        - AI assistant
        - Microsoft account / login
        - Auto-update
        - Other / not sure
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Logs
      description: Paste the relevant part of the launcher log or the game's latest.log.
      render: shell
  - type: checkboxes
    id: checks
    attributes:
      label: Checklist
      options:
        - label: I searched existing issues and this hasn't been reported yet.
          required: true
