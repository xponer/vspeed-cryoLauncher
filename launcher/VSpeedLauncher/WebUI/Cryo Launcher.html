<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <!-- Content-Security-Policy — lock the surface to exactly what the app needs.
       Scripts are first-party ONLY ('self': vendored React + the app's own files) — no
       inline script, no eval, no third-party script origin. Styles/fonts allow the Geist
       CSS on jsdelivr; images allow https + data: (modpack art, base64 thumbnails).
       Everything else is denied: no iframes, plugins, workers, form posts, <base> hijack,
       or cross-origin connections (data exfiltration). -->
  <meta http-equiv="Content-Security-Policy" content="default-src 'none'; script-src 'self'; style-src 'self' 'unsafe-inline' https://cdn.jsdelivr.net; font-src 'self' https://cdn.jsdelivr.net; img-src 'self' data: https:; connect-src 'self'; base-uri 'none'; form-action 'none'; frame-src 'none'; object-src 'none'; media-src 'none'; worker-src 'none'; manifest-src 'none'" />

  <title>Cryo — Modpack Launcher</title>
  <!-- Inline SVG favicon (brand snowflake) — avoids a 404 for /favicon.ico; data: is allowed by img-src. -->
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='none' stroke='%237AA2FF' stroke-width='1.5' stroke-linecap='round'%3E%3Cpath d='M12 2L12 22M2 12L22 12M4.9 4.9L19.1 19.1M19.1 4.9L4.9 19.1'/%3E%3C/svg%3E" />

  <!-- Geist (sans + mono) via fontsource CDN -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@fontsource/geist-sans@5.0.3/400.css" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@fontsource/geist-sans@5.0.3/500.css" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@fontsource/geist-sans@5.0.3/600.css" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@fontsource/geist-sans@5.0.3/700.css" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@fontsource/geist-mono@5.0.3/400.css" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@fontsource/geist-mono@5.0.3/500.css" />

  <link rel="stylesheet" href="src/styles.css" />

  <!-- In-page startup splash (paints immediately, before the app scripts load). Removed
       by store.js once the initial data has loaded — same surface as the app, so
       there's no black gap between the splash and the rendered launcher. -->
  <style>
    html, body { margin: 0; background: #070910; }
    #cryo-splash {
      position: fixed; inset: 0; z-index: 99999;
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      background: radial-gradient(62% 62% at 50% 42%, #16182A 0%, #0A0C14 62%, #070910 100%);
      transition: opacity .4s ease; opacity: 1;
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
    }
    #cryo-splash.cryo-hide { opacity: 0; pointer-events: none; }
    /* Static logo (no transform animation — SVG rotation rasterises on the main
       thread; the GPU-composited ring below carries the motion instead). */
    #cryo-splash .cs-flake { width: 80px; height: 80px; opacity: .95; }
    #cryo-splash .cs-name { margin-top: 16px; font-size: 27px; font-weight: 700; color: #ECECF1; letter-spacing: -.5px; }
    #cryo-splash .cs-sub  { margin-top: 5px; font-size: 12.5px; color: #8A90A8; }
    /* GPU-composited spinner — stays smooth even while the main thread is busy. */
    #cryo-splash .cs-spin {
      margin-top: 22px; width: 30px; height: 30px;
      border: 3px solid rgba(120,140,200,.16); border-top-color: #7AA2FF; border-radius: 50%;
      animation: cs-rot .8s linear infinite; will-change: transform;
    }
    @keyframes cs-rot { to { transform: rotate(360deg); } }
  </style>

  <!-- React 18.3.1 (production), vendored locally — no CDN at startup (faster, works
       offline, and keeps script-src to 'self'). UMD globals: window.React / ReactDOM.
       `defer` so neither blocks the splash's first paint; defer preserves order, so
       these still run before the app scripts below. -->
  <script defer src="vendor/react.production.min.js"></script>
  <script defer src="vendor/react-dom.production.min.js"></script>
</head>
<body>
  <div id="cryo-splash">
    <svg class="cs-flake" viewBox="0 0 24 24" fill="none" stroke-width="1.5" stroke-linecap="round">
      <defs>
        <linearGradient id="cs-grad" x1="0" y1="0" x2="1" y2="1">
          <stop offset="0" stop-color="#63B3FF" />
          <stop offset="1" stop-color="#A06BFF" />
        </linearGradient>
      </defs>
      <path d="M12 2 L12 22 M2 12 L22 12 M4.9 4.9 L19.1 19.1 M19.1 4.9 L4.9 19.1" stroke="url(#cs-grad)" />
    </svg>
    <div class="cs-name">Cryo</div>
    <div class="cs-sub">loading…</div>
    <div class="cs-spin"></div>
  </div>
  <div id="root"></div>

  <!-- App scripts — plain JS (no JSX; everything is React.createElement). `defer` keeps
       execution in document order while letting the WebView download them in parallel. -->
  <script defer src="src/mockData.js"></script>
  <script defer src="src/i18n.js"></script>
  <script defer src="src/store.js"></script>
  <script defer src="src/ui.js"></script>
  <script defer src="src/charts.js"></script>
  <script defer src="src/instance-overview.js"></script>
  <script defer src="src/instance-tabs.js"></script>
  <script defer src="src/library.js"></script>
  <script defer src="src/instance.js"></script>
  <script defer src="src/logs.js"></script>
  <script defer src="src/dashboard.js"></script>
  <script defer src="src/assistant.js"></script>
  <script defer src="src/modrinth.js"></script>
  <script defer src="src/settings.js"></script>
  <script defer src="src/app.js"></script>
</body>
</html>
